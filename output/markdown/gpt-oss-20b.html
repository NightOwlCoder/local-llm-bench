<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Markdown Previewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  /* Global */
  html,body{margin:0;padding:0;height:100%;font-family:Arial,Helvetica,sans-serif;}
  .container{display:flex;height:100%;overflow:hidden;}

  /* Editor pane */
  .editor{flex:1;padding:10px;border-right:1px solid #ddd;box-sizing:border-box;background:#f7f7f7;}
  .editor textarea{width:100%;height:100%;border:none;outline:none;font-family:monospace;font-size:14px;resize:none;background:#fff;padding:10px;box-sizing:border-box;}

  /* Preview pane */
  .preview{flex:1;padding:10px;overflow-y:auto;background:#fff;}
  .preview h1{font-size:2em;margin-top:.5em;}
  .preview h2{font-size:1.75em;margin-top:.75em;}
  .preview h3{font-size:1.5em;margin-top:.75em;}
  .preview h4{font-size:1.25em;margin-top:.75em;}
  .preview h5{font-size:1em;margin-top:.75em;}
  .preview h6{font-size:.875em;margin-top:.75em;}
  .preview p{margin:.5em 0;}
  .preview a{color:#0066cc;text-decoration:none;}
  .preview a:hover{text-decoration:underline;}
  .preview code{background:#f5f5f5;padding:2px 4px;border-radius:4px;}
  .preview pre{background:#f0f0f0;padding:10px;overflow-x:auto;}
  .preview pre code{padding:0;background:none;}
  .preview ul, .preview ol{margin-left:1.5em;list-style-position:outside;}
  .preview blockquote{border-left:4px solid #ddd;padding-left:1em;color:#555;margin:1em 0;}

  /* Mobile */
  @media(max-width:768px){
    .container{flex-direction:column;}
    .editor,.preview{height:50%;border-right:none;border-top:1px solid #ddd;}
  }
</style>
</head>

<body>
<div class="container">
  <div class="editor">
    <textarea id="markdown" placeholder="Write Markdown here…"></textarea>
  </div>
  <div class="preview" id="preview"></div>
</div>
