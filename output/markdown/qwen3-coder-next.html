<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Markdown Previewer</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #333;
            --editor-bg: #1e1e1e;
            --editor-text: #d4d4d4;
            --sidebar-width: 50%;
            --border-color: #ddd;
            --accent-color: #007bff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #232931;
            color: white;
            padding: 1rem;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 1.5rem; font-weight: 600; }
        .status { font-size: 0.85rem; color: #8b949e; }

        /* Main Workspace */
        .workspace {
            display: flex;
            flex: 1;
            height: 100%;
            overflow: hidden;
        }

        /* Editor Section */
        .editor-pane {
            width: var(--sidebar-width);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .pane-label {
            padding: 10px 15px;
            background: #eee;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
        }

        #editor {
            flex: 1;
            width: 100%;
            border: none;
            padding: 20px;
            font-family: "Fira Code", "Consolas", "Monaco", monospace;
            font-size: 15px;
            line-height: 1.6;
            resize: none;
            background-color: var(--editor-bg);
            color: var(--editor-text);
            outline: none;
        }

        /* Preview Section */
        .preview-pane {
            width: var(--sidebar-width);
            height: 100%;
            overflow-y: auto;
            padding: 40px;
            background-color: white;
        }

        /* Markdown Styles (The "Beautiful" Part) */
        #preview {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-radius: 8px;
        }

        #preview * {
            box-sizing: border-box;
        }

        #preview h1, #preview h2, #preview h3 {
            margin-top: 1.5em;
            margin-bottom: 0.8em;
            color: #24292e;
            line-height: 1.25;
        }

        #preview h1 { font-size: 2.5em; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
        #preview h2 { font-size: 2em; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
        #preview h3 { font-size: 1.5em; }
        #preview h4 { font-size: 1.25em; }
        #preview h5 { font-size: 1em; }
        #preview h6 { font-size: 0.875em; color: #6a737d; }

        #preview p { margin-bottom: 1em; line-height: 1.6; color: #24292e; }

        #preview strong { font-weight: 600; color: #24292e; }
        #preview em { font-style: italic; color: #586e75; }

        #preview code {
            font-family: "Fira Code", "Consolas", monospace;
            background-color: rgba(27,31,35,0.05);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-size: 0.9em;
            color: #d73a49;
        }

        #preview pre {
            background-color: #282c34;
            padding: 1.2em;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 1em;
        }

        #preview pre code {
            background-color: transparent;
            padding: 0;
            color: #abb2bf;
        }

        #preview ul, #preview ol {
            margin-bottom: 1em;
            padding-left: 2em;
            color: #24292e;
        }
        #preview li { margin-bottom: 0.5em; line-height: 1.5; }

        #preview a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }
        #preview a:hover {
            text-decoration: underline;
            color: #0056b3;
        }

        #preview blockquote {
            border-left: 4px solid var(--accent-color);
            padding: 0 1em;
            margin-left: 0;
            color: #6a737d;
            font-style: italic;
        }

        #preview hr {
            border: 0;
            height: 1px;
            background: #ddd;
            margin: 2em 0;
        }

        #preview table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1em;
            font-size: 0.95em;
        }
        #preview th, #preview td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        #preview th { background-color: #f2f2f2; font-weight: 600; }

        /* Responsive Mobile View */
        @media (max-width: 768px) {
            .workspace { flex-direction: column; }
            .editor-pane, .preview-pane { width: 100%; height: 50%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Markdown Studio</h1>
        <div class="status">Live Preview Enabled</div>
    </header>

    <div class="workspace">
        <!-- Editor Side -->
        <div class="editor-pane">
            <div class="pane-label">Editor (Markdown)</div>
            <textarea id="editor" spellcheck="false" placeholder="# Type your markdown here...&#10;&#10;Start typing to see the magic happen..."></textarea>
        </div>

        <!-- Preview Side -->
        <div class="preview-pane">
            <div class="pane-label" style="background: #f9f9f9; border-bottom: 1px solid #eee;">Preview (HTML)</div>
            <div id="preview"></div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');

        // Default Content for first load
        const defaultContent = `# Welcome to Markdown Studio

This is a live Markdown previewer built entirely with **HTML**, **CSS**, and *Vanilla JavaScript*.

## Features Included
- Headers (H1 - H6)
- **Bold** and *Italic* text
- Code blocks and inline \`code\`
- Ordered and Unordered lists
- Links and Images
- Blockquotes
- Horizontal Rules

## Code Example
\`\`\`javascript
function helloWorld() {
    console.log("Hello, World!");
    // This is a code block
}
\`\`\`

## Lists
1. First Item
2. Second Item
3. Third Item

- Red
- Green
- Blue

> "Simplicity is the ultimate sophistication." 
> — Leonardo da Vinci

[Back to Top](#welcome-to-markdown-studio)
`;

        // Simple Regex-based Markdown Parser
        // Note: This is a robust implementation for a single-file project without heavy libraries.
        function parseMarkdown(text) {
            if (!text) return '';

            let html = text;

            // 1. Escape HTML special characters to prevent XSS (but we leave markdown syntax alone)
            // We do this first
            html = html
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // 2. Code Blocks (```) - Must be processed early to protect inner content
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, function(match, lang, code) {
                // Trim whitespace inside code block
                const cleanCode = code.trim();
                return `<pre><code>${cleanCode}</code></pre>`;
            });

            // 3. Inline Code (``) - Must be processed before headers/links
            // We use a placeholder trick to avoid parsing code content
            const codePlaceholders = [];
            html = html.replace(/`([^`]+)`/g, function(match, code) {
                codePlaceholders.push(`<code>${code}</code>`);
                return `__CODE_BLOCK_${codePlaceholders.length - 1}__`;
            });

            // 4. Headers (# to ######)
            html = html.replace(/^(#{1,6})\s+(.+)$/gm, function(match, hashes, text) {
                const level = hashes.length;
                return `<h${level}>${text}</h${level}>`;
            });

            // 5. Bold and Italic (**, __, *, _)
            // Strong first
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
            // Em (Italic)
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/_(.+?)_/g, '<em>$1</em>');

            // 6. Links [text](url)
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

            // 7. Images ![alt](url)
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%; height:auto; border-radius:4px; margin: 1em 0;" />');

            // 8. Blockquotes >
            html = html.replace(/^>(.+)$/gm, '<blockquote>$1</blockquote>');

            // 9. Horizontal Rules (---, ***, ___)
            html = html.replace(/^([-]{3,}|[*]{3,}|[_]{3,})$/gm, '<hr />');

            // 10. Lists
            // Unordered lists (* or -)
            html = html.replace(/^[\*\-]\s+(.+)$/gm, function(match, item) {
                return `<li>${item}</li>`;
            });
            // Wrap consecutive <li> in <ul>
            html = html.replace(/(<li>.*?<\/li>\n?)+/g, '<ul>$&</ul>');

            // Ordered lists (1. 2. etc)
            html = html.replace(/^\d+\.\s+(.+)$/gm, function(match, item) {
                return `<li>${item}</li>`;
            });
            html = html.replace(/(<li>.*?<\/li>\n?)+/g, function(match) {
                return match.includes('li>') ? `<ol>${match}</ol>` : match;
            });

            // 11. Paragraphs (Double newlines -> <p>)
            // Split by two or more newlines
            const paragraphs = html.split(/\n\n+/);
            
            return paragraphs.map(para => {
                // If it already has a block tag, don't wrap in <p>
                if (para.match(/^<(h[1-6]|ul|ol|li|blockquote|pre|hr|table)/)) {
                    return para.trim();
                }
                // Restore code blocks
                para = para.replace(/__CODE_BLOCK_(\d+)__/g, (_, index) => codePlaceholders[index]);
                // Convert single newlines to <br> within paragraphs
                return `<p>${para.replace(/\n/g, '<br>')}</p>`;
            }).join('\n');
        }

        // Update function
        function update() {
            const markdown = editor.value;
            const html = parseMarkdown(markdown);
            preview.innerHTML = html;
        }

        // Event Listeners
        editor.addEventListener('input', update);

        // Initialize
        editor.value = defaultContent;
        update();
    </script>
</body>
</html>
