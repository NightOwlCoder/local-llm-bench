<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Todo App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    /* Light theme variables */
    --bg: #f2f4f6;
    --card-bg: #ffffff;
    --accent: #4caf50;
    --text: #333333;
    --muted: #777777;
    --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
    --border-radius: 12px;
  }

  /* Dark theme overrides */
  [data-theme="dark"] {
    --bg: #121212;
    --card-bg: #1e1e1e;
    --accent: #81c784;
    --text: #e0e0e0;
    --muted: #bdbdbd;
    --shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
  }

  * { box-sizing: border-box; }
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s, color 0.3s;
  }
  .app {
    max-width: 600px;
    margin: 2rem auto;
    padding: 1rem;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  header h1 {
    margin: 0;
    font-size: 1.8rem;
  }
  #themeToggle {
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: var(--muted);
  }
  #todoForm {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  #todoInput {
    flex: 1;
    padding: 0.75rem;
    font-size: 1rem;
    border: 1px solid #ccc;
    border-radius: var(--border-radius);
    transition: border-color 0.3s;
  }
  #todoInput:focus {
    outline: none;
    border-color: var(--accent);
  }
  #todoForm button {
    padding: 0.75rem 1rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--border-radius);
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.3s;
  }
  #todoForm button:hover { background: #45a049; }
  #todoList {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .todo-item {
    background: var(--card-bg);
    padding: 1rem;
    margin-bottom: 0.75rem;
    border-radius: var(--border-radius);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    transition: transform 0.2s, opacity 0.2s;
  }
  .todo-item:hover { transform: translateX(5px); }
  .todo-item.completed .task-text { text-decoration: line-through; color: var(--muted); }
  .todo-item .check {
    cursor: pointer;
    margin-right: 0.75rem;
    flex-shrink: 0;
  }
  .todo-item .task-text {
    flex: 1;
    font-size: 1rem;
    line-height: 1.4;
  }
  .todo-item .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.2rem;
    transition: color 0.3s;
  }
  .todo-item .delete-btn:hover { color: #d32f2f; }
  @media (max-width: 480px) {
    .app { margin: 1rem; }
    header h1 { font-size: 1.5rem; }
    #todoForm button { padding: 0.5rem 0.75rem; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Todo List</h1>
    <button id="themeToggle" aria-label="Toggle dark mode">🌙</button>
  </header>
  <main>
    <form id="todoForm" autocomplete="off">
      <input type="text" id="todoInput" placeholder="Add a new task…" required>
      <button type="submit">Add</button>
    </form>
    <ul id="todoList"></ul>
  </main>
</div>

<script>
  /* ---------- Utility ---------- */
  const STORAGE_KEY = 'todoApp.todos';

  const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

  /* ---------- Theme Toggle ---------- */
  const themeToggle = document.getElementById('themeToggle');
  const setTheme = (theme) => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
  };
  const initTheme = () => {
    const stored = localStorage.getItem('theme');
    setTheme(stored || 'light');
  };
  themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    setTheme(current === 'dark' ? 'light' : 'dark');
  });
  initTheme();

  /* ---------- Todo App Logic ---------- */
  const todoInput = document.getElementById('todoInput');
  const todoForm = document.getElementById('todoForm');
  const todoList = document.getElementById('todoList');

  let todos = [];

  const saveTodos = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));

  const renderTodos = () => {
    todoList.innerHTML = '';
    todos.forEach(todo => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (todo.completed ? ' completed' : '');
      li.dataset.id = todo.id;

      // Checkbox
      const checkBtn = document.createElement('span');
      checkBtn.innerHTML = todo.completed
        ? `<svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="9" fill="#4caf50"/><path d="M6 10l3 3 6-6" stroke="white" stroke-width="2" fill="none"/></svg>`
        : `<svg width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="9" fill="none" stroke="#bbb" stroke-width="2"/></svg>`;
      checkBtn.className = 'check';
      checkBtn.addEventListener('click', () => toggleComplete(todo.id));
      li.appendChild(checkBtn);

      // Task text
      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = todo.text;
      li.appendChild(span);

      // Delete button
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 20 20"><rect x="4" y="4" width="12" height="12" fill="none" stroke="#bbb" stroke-width="2"/><path d="M6 6l8 8M6 14L14 6" stroke="#bbb" stroke-width="2"/></svg>`;
      delBtn.addEventListener('click', () => deleteTodo(todo.id));
      li.appendChild(delBtn);

      todoList.appendChild(li);
    });
  };

  const addTodo = (text) => {
    const newTodo = { id: generateId(), text, completed: false };
    todos.push(newTodo);
    saveTodos();
    renderTodos();
  };

  const toggleComplete = (id) => {
    todos = todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
    saveTodos();
    renderTodos();
  };

  const deleteTodo = (id) => {
    todos = todos.filter(t => t.id !== id);
    saveTodos();
    renderTodos();
  };

  /* ---------- Event Listeners ---------- */
  todoForm.addEventListener('submit', e => {
    e.preventDefault();
    const text = todoInput.value.trim();
    if (text) {
      addTodo(text);
      todoInput.value = '';
    }
  });

  /* ---------- Initialization ---------- */
  const loadTodos = () => {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        todos = JSON.parse(stored);
      } catch (e) {
        console.error('Failed to parse todos', e);
        todos = [];
      }
    }
    renderTodos();
  };

  loadTodos();
</script>
</body>
</html>
